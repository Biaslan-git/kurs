name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt6 python-docx pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name="Certificate_System" src/main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Certificate_System_Windows
          path: dist/Certificate_System.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: dist/Certificate_System.exe
          body: |
            Система справок о составе семьи

            Скачайте Certificate_System.exe и запустите на Windows.
